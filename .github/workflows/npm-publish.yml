name: npm Publish

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.release.tag_name != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Validate npm Wrapper Logic
        run: node packages/npm/clawguard/scripts/test-install.js

      - name: Sync Package Version From Release Tag
        if: github.event_name == 'release'
        working-directory: packages/npm/clawguard
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Publish
        working-directory: packages/npm/clawguard
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
